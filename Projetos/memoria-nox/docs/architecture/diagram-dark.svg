<?xml version="1.0" encoding="UTF-8"?>
<!--
  nox-mem canonical architecture diagram — dark variant
  Palette D: background #0d1117, accent #00C896
  Generated from docs/architecture/diagram.mmd
  Pillars: Q (Quality) / A (Autonomy) / P (Product) / Lab / GTM
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 820" width="1200" height="820"
     role="img" aria-label="nox-mem architecture diagram — dark theme">
  <defs>
    <style>
      .layer-bg   { rx: 8; ry: 8; }
      .layer-title { font: bold 11px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .node-box   { rx: 5; ry: 5; }
      .node-text  { font: 600 10px ui-monospace, SFMono-Regular, Menlo, monospace; }
      .node-sub   { font: 400 8px ui-monospace, SFMono-Regular, Menlo, monospace; opacity: 0.7; }
      .arrow      { fill: none; stroke-width: 1.5; marker-end: url(#arrowhead); }
      .arrow-dashed { fill: none; stroke-width: 1.5; stroke-dasharray: 5,3; marker-end: url(#arrowhead-dim); }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#8b949e"/>
    </marker>
    <marker id="arrowhead-dim" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a5568"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1200" height="820" fill="#0d1117"/>

  <!-- Title -->
  <text x="600" y="32" text-anchor="middle"
        font="bold 16px ui-monospace, SFMono-Regular, Menlo, monospace"
        fill="#e6edf3">nox-mem architecture</text>
  <text x="600" y="50" text-anchor="middle"
        font="10px ui-monospace, SFMono-Regular, Menlo, monospace"
        fill="#8b949e">Quality · Autonomy · Product · Lab · GTM Phase 2</text>
  <line x1="40" y1="62" x2="1160" y2="62" stroke="#30363d" stroke-width="1"/>

  <!-- ── User Layer ─────────────────────────────────────── -->
  <rect class="layer-bg" x="30" y="75" width="1140" height="115"
        fill="#0d2233" stroke="#00c896" stroke-width="1.5" rx="8"/>
  <text class="layer-title" x="46" y="95" fill="#00c896">User Layer</text>

  <!-- CLI -->
  <rect class="node-box" x="60" y="105" width="120" height="55" fill="#1a3a4a" stroke="#00c896" stroke-width="1"/>
  <text class="node-text" x="120" y="127" text-anchor="middle" fill="#e6edf3">nox-mem CLI</text>
  <text class="node-sub" x="120" y="142" text-anchor="middle" fill="#00c896">26+ commands</text>

  <!-- HTTP API -->
  <rect class="node-box" x="220" y="105" width="140" height="55" fill="#1a3a4a" stroke="#00c896" stroke-width="1"/>
  <text class="node-text" x="290" y="127" text-anchor="middle" fill="#e6edf3">HTTP API</text>
  <text class="node-sub" x="290" y="142" text-anchor="middle" fill="#00c896">:18802</text>

  <!-- MCP Server -->
  <rect class="node-box" x="400" y="105" width="140" height="55" fill="#1a3a4a" stroke="#00c896" stroke-width="1"/>
  <text class="node-text" x="470" y="127" text-anchor="middle" fill="#e6edf3">MCP Server</text>
  <text class="node-sub" x="470" y="142" text-anchor="middle" fill="#00c896">16 tools</text>

  <!-- Viewer SSE -->
  <rect class="node-box" x="580" y="105" width="150" height="55" fill="#1a3a4a" stroke="#00c896" stroke-width="1.5"/>
  <text class="node-text" x="655" y="127" text-anchor="middle" fill="#e6edf3">Viewer SSE</text>
  <text class="node-sub" x="655" y="142" text-anchor="middle" fill="#00c896">P5 · :18802/viewer</text>

  <!-- IDE Plugins -->
  <rect class="node-box" x="770" y="105" width="150" height="55" fill="#1a3a4a" stroke="#00c896" stroke-width="1"/>
  <text class="node-text" x="845" y="127" text-anchor="middle" fill="#e6edf3">IDE Plugins</text>
  <text class="node-sub" x="845" y="142" text-anchor="middle" fill="#00c896">P4 · Tier A (3 IDEs)</text>

  <!-- ── Pipeline Layer ──────────────────────────────────── -->
  <rect class="layer-bg" x="30" y="210" width="1140" height="140"
        fill="#0d1a0d" stroke="#2ea043" stroke-width="1.5" rx="8"/>
  <text class="layer-title" x="46" y="230" fill="#2ea043">Pipeline Layer</text>

  <!-- Ingest Router -->
  <rect class="node-box" x="60" y="240" width="130" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1"/>
  <text class="node-text" x="125" y="262" text-anchor="middle" fill="#e6edf3">Ingest Router</text>
  <text class="node-sub" x="125" y="277" text-anchor="middle" fill="#2ea043">A2 · unified dispatch</text>

  <!-- Hybrid Search -->
  <rect class="node-box" x="220" y="240" width="130" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1"/>
  <text class="node-text" x="285" y="262" text-anchor="middle" fill="#e6edf3">Hybrid Search</text>
  <text class="node-sub" x="285" y="277" text-anchor="middle" fill="#2ea043">BM25 + dense + RRF</text>

  <!-- Answer Primitive -->
  <rect class="node-box" x="380" y="240" width="140" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1.5"/>
  <text class="node-text" x="450" y="262" text-anchor="middle" fill="#e6edf3">Answer Primitive</text>
  <text class="node-sub" x="450" y="277" text-anchor="middle" fill="#2ea043">P1</text>

  <!-- Privacy Redaction -->
  <rect class="node-box" x="550" y="240" width="145" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1"/>
  <text class="node-text" x="622" y="262" text-anchor="middle" fill="#e6edf3">Privacy Redaction</text>
  <text class="node-sub" x="622" y="277" text-anchor="middle" fill="#2ea043">A1 + A1.1 · default-deny</text>

  <!-- Event Bus -->
  <rect class="node-box" x="725" y="240" width="130" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1.5"/>
  <text class="node-text" x="790" y="262" text-anchor="middle" fill="#e6edf3">Event Bus</text>
  <text class="node-sub" x="790" y="277" text-anchor="middle" fill="#2ea043">P5a · fire-forget</text>

  <!-- Hooks -->
  <rect class="node-box" x="885" y="240" width="130" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1"/>
  <text class="node-text" x="950" y="262" text-anchor="middle" fill="#e6edf3">Hooks Auto-capture</text>
  <text class="node-sub" x="950" y="277" text-anchor="middle" fill="#2ea043">P2</text>

  <!-- Export -->
  <rect class="node-box" x="1045" y="240" width="110" height="55" fill="#1a2a1a" stroke="#2ea043" stroke-width="1"/>
  <text class="node-text" x="1100" y="262" text-anchor="middle" fill="#e6edf3">Export</text>
  <text class="node-sub" x="1100" y="277" text-anchor="middle" fill="#2ea043">A2 · AES-256-GCM</text>

  <!-- ── Quality Layer ────────────────────────────────────── -->
  <rect class="layer-bg" x="30" y="370" width="850" height="140"
        fill="#0d0d1a" stroke="#8957e5" stroke-width="1.5" rx="8"/>
  <text class="layer-title" x="46" y="390" fill="#8957e5">Quality Layer</text>

  <!-- FTS5 -->
  <rect class="node-box" x="60" y="400" width="110" height="55" fill="#1a1a3a" stroke="#8957e5" stroke-width="1"/>
  <text class="node-text" x="115" y="422" text-anchor="middle" fill="#e6edf3">FTS5 BM25</text>
  <text class="node-sub" x="115" y="437" text-anchor="middle" fill="#8957e5">language-aware</text>

  <!-- sqlite-vec -->
  <rect class="node-box" x="200" y="400" width="115" height="55" fill="#1a1a3a" stroke="#8957e5" stroke-width="1"/>
  <text class="node-text" x="257" y="422" text-anchor="middle" fill="#e6edf3">sqlite-vec</text>
  <text class="node-sub" x="257" y="437" text-anchor="middle" fill="#8957e5">Gemini 3072d</text>

  <!-- RRF Fusion -->
  <rect class="node-box" x="345" y="400" width="120" height="55" fill="#1a1a3a" stroke="#8957e5" stroke-width="1.5"/>
  <text class="node-text" x="405" y="422" text-anchor="middle" fill="#e6edf3">RRF Fusion</text>
  <text class="node-sub" x="405" y="437" text-anchor="middle" fill="#8957e5">k=60 · lang-aware</text>

  <!-- Salience -->
  <rect class="node-box" x="495" y="400" width="145" height="55" fill="#1a1a3a" stroke="#8957e5" stroke-width="1.5"/>
  <text class="node-text" x="567" y="418" text-anchor="middle" fill="#e6edf3">Salience Formula</text>
  <text class="node-sub" x="567" y="433" text-anchor="middle" fill="#8957e5">recency × pain ×</text>
  <text class="node-sub" x="567" y="447" text-anchor="middle" fill="#8957e5">importance</text>

  <!-- KG Extraction -->
  <rect class="node-box" x="660" y="400" width="130" height="55" fill="#1a1a3a" stroke="#8957e5" stroke-width="1"/>
  <text class="node-text" x="725" y="422" text-anchor="middle" fill="#e6edf3">KG Extraction</text>
  <text class="node-sub" x="725" y="437" text-anchor="middle" fill="#8957e5">L4 · Gemini 2.5 Flash</text>

  <!-- ── Storage Layer ─────────────────────────────────────── -->
  <rect class="layer-bg" x="30" y="530" width="1140" height="140"
        fill="#1a0d0d" stroke="#f85149" stroke-width="1.5" rx="8"/>
  <text class="layer-title" x="46" y="550" fill="#f85149">Storage Layer</text>

  <!-- chunks -->
  <rect class="node-box" x="60" y="560" width="130" height="55" fill="#2a1a1a" stroke="#f85149" stroke-width="1"/>
  <text class="node-text" x="125" y="582" text-anchor="middle" fill="#e6edf3">chunks</text>
  <text class="node-sub" x="125" y="597" text-anchor="middle" fill="#f85149">FTS5 · 62k+ rows</text>

  <!-- embeddings -->
  <rect class="node-box" x="220" y="560" width="140" height="55" fill="#2a1a1a" stroke="#f85149" stroke-width="1"/>
  <text class="node-text" x="290" y="582" text-anchor="middle" fill="#e6edf3">vec_chunks</text>
  <text class="node-sub" x="290" y="597" text-anchor="middle" fill="#f85149">~99.97% coverage</text>

  <!-- kg_entities -->
  <rect class="node-box" x="390" y="560" width="140" height="55" fill="#2a1a1a" stroke="#f85149" stroke-width="1"/>
  <text class="node-text" x="460" y="582" text-anchor="middle" fill="#e6edf3">kg_entities</text>
  <text class="node-sub" x="460" y="597" text-anchor="middle" fill="#f85149">~402 entities</text>

  <!-- kg_relations -->
  <rect class="node-box" x="560" y="560" width="140" height="55" fill="#2a1a1a" stroke="#f85149" stroke-width="1"/>
  <text class="node-text" x="630" y="582" text-anchor="middle" fill="#e6edf3">kg_relations</text>
  <text class="node-sub" x="630" y="597" text-anchor="middle" fill="#f85149">~544 typed edges</text>

  <!-- ops_audit -->
  <rect class="node-box" x="730" y="560" width="155" height="55" fill="#2a1a1a" stroke="#f85149" stroke-width="1"/>
  <text class="node-text" x="807" y="582" text-anchor="middle" fill="#e6edf3">ops_audit</text>
  <text class="node-sub" x="807" y="597" text-anchor="middle" fill="#f85149">append-only · triggers</text>

  <!-- telemetry -->
  <rect class="node-box" x="915" y="560" width="135" height="55" fill="#2a1a1a" stroke="#f85149" stroke-width="1"/>
  <text class="node-text" x="982" y="582" text-anchor="middle" fill="#e6edf3">telemetry</text>
  <text class="node-sub" x="982" y="597" text-anchor="middle" fill="#f85149">viewer + search</text>

  <!-- ── Provider Layer ──────────────────────────────────── -->
  <rect class="layer-bg" x="900" y="370" width="270" height="140"
        fill="#1a1a0d" stroke="#d29922" stroke-width="1.5" rx="8"/>
  <text class="layer-title" x="916" y="390" fill="#d29922">Provider Layer · A3</text>

  <!-- Gemini -->
  <rect class="node-box" x="916" y="400" width="110" height="40" fill="#2a2a1a" stroke="#d29922" stroke-width="1.5"/>
  <text class="node-text" x="971" y="425" text-anchor="middle" fill="#e6edf3">Gemini · default</text>

  <!-- OpenAI -->
  <rect class="node-box" x="916" y="450" width="110" height="30" fill="#2a2a1a" stroke="#d29922" stroke-width="1"/>
  <text class="node-text" x="971" y="470" text-anchor="middle" fill="#8b949e">OpenAI</text>

  <!-- Anthropic -->
  <rect class="node-box" x="1045" y="400" width="110" height="40" fill="#2a2a1a" stroke="#d29922" stroke-width="1"/>
  <text class="node-text" x="1100" y="425" text-anchor="middle" fill="#8b949e">Anthropic</text>

  <!-- Voyage -->
  <rect class="node-box" x="1045" y="450" width="110" height="30" fill="#2a2a1a" stroke="#d29922" stroke-width="1"/>
  <text class="node-text" x="1100" y="470" text-anchor="middle" fill="#8b949e">Voyage</text>

  <!-- ── Arrows: User → Pipeline ─────────────────────────── -->
  <!-- CLI → Ingest -->
  <line class="arrow" x1="120" y1="160" x2="120" y2="238" stroke="#8b949e"/>
  <!-- CLI → Search -->
  <line class="arrow" x1="140" y1="160" x2="280" y2="238" stroke="#8b949e"/>
  <!-- API → Answer -->
  <line class="arrow" x1="290" y1="160" x2="445" y2="238" stroke="#8b949e"/>
  <!-- MCP → Search -->
  <line class="arrow" x1="465" y1="160" x2="295" y2="238" stroke="#8b949e"/>
  <!-- Viewer → EventBus -->
  <line class="arrow" x1="655" y1="160" x2="785" y2="238" stroke="#00c896"/>
  <!-- IDE → API -->
  <line class="arrow" x1="845" y1="160" x2="295" y2="160" stroke="#8b949e"/>
  <!-- Hooks → Ingest -->
  <line class="arrow" x1="950" y1="295" x2="195" y2="270" stroke="#2ea043"/>

  <!-- ── Arrows: Pipeline → Quality ─────────────────────── -->
  <!-- Search → FTS5 -->
  <line class="arrow" x1="250" y1="350" x2="115" y2="398" stroke="#8b949e"/>
  <!-- Search → vec -->
  <line class="arrow" x1="270" y1="350" x2="255" y2="398" stroke="#8b949e"/>
  <!-- FTS5 → RRF -->
  <line class="arrow" x1="170" y1="427" x2="343" y2="427" stroke="#8b949e"/>
  <!-- vec → RRF -->
  <line class="arrow" x1="315" y1="427" x2="343" y2="427" stroke="#8b949e"/>
  <!-- RRF → Salience -->
  <line class="arrow" x1="465" y1="427" x2="493" y2="427" stroke="#8b949e"/>
  <!-- Ingest → KG -->
  <line class="arrow" x1="175" y1="270" x2="680" y2="410" stroke="#2ea043"/>

  <!-- ── Arrows: Pipeline → Storage ─────────────────────── -->
  <!-- Redact → chunks -->
  <line class="arrow" x1="580" y1="318" x2="130" y2="558" stroke="#2ea043"/>
  <!-- Ingest → vec_chunks -->
  <line class="arrow" x1="150" y1="318" x2="285" y2="558" stroke="#2ea043"/>
  <!-- KG → kg_entities -->
  <line class="arrow" x1="705" y1="470" x2="460" y2="558" stroke="#8957e5"/>
  <!-- KG → kg_relations -->
  <line class="arrow" x1="720" y1="470" x2="630" y2="558" stroke="#8957e5"/>
  <!-- EventBus → telemetry -->
  <line class="arrow" x1="800" y1="318" x2="982" y2="558" stroke="#2ea043"/>

  <!-- ── Arrows: Provider ────────────────────────────────── -->
  <!-- Answer → Gemini -->
  <line class="arrow" x1="520" y1="265" x2="916" y2="415" stroke="#d29922"/>

  <!-- Legend -->
  <rect x="30" y="695" width="1140" height="90" fill="#0d1117" stroke="#30363d" rx="4"/>
  <text x="46" y="715" font="bold 10px ui-monospace, Menlo, monospace" fill="#8b949e">Pillars mapped:</text>
  <rect x="46" y="722" width="10" height="10" fill="#2ea043"/>
  <text x="62" y="732" font="9px ui-monospace, Menlo, monospace" fill="#8b949e">P1 Answer · P2 Hooks · P5 Viewer · P5a EventBus → Pipeline</text>
  <rect x="46" y="742" width="10" height="10" fill="#2ea043"/>
  <text x="62" y="752" font="9px ui-monospace, Menlo, monospace" fill="#8b949e">A1+A1.1 Redaction · A2 Ingest/Export · A3 Providers → Pipeline + Provider</text>
  <rect x="46" y="762" width="10" height="10" fill="#8957e5"/>
  <text x="62" y="772" font="9px ui-monospace, Menlo, monospace" fill="#8b949e">L2 Conflict · L3 Confidence · L4 KG → Quality</text>
  <text x="600" y="715" font="9px ui-monospace, Menlo, monospace" text-anchor="middle" fill="#00c896">nox-mem v3.7 · "Hybrid memory with shadow discipline — yours by design."</text>
</svg>
