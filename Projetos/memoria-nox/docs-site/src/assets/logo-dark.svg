  <!-- Main mark: [m] bracket monogram -->
  <!-- Left bracket [ -->
  <path d="M 78 84 L 64 84 L 64 172 L 78 172" fill="none" stroke="#EBEBEB" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

