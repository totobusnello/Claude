name: SDK — Go

on:
  push:
    paths:
      - "sdk/go/**"
      - ".github/workflows/sdk-go.yml"
  pull_request:
    paths:
      - "sdk/go/**"
      - ".github/workflows/sdk-go.yml"

jobs:
  test:
    name: go build + test + vet
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: sdk/go/go.sum

      - name: Build
        working-directory: sdk/go
        run: go build ./...

      - name: Vet
        working-directory: sdk/go
        run: go vet ./...

      - name: Test
        working-directory: sdk/go
        run: go test -race -count=1 ./...

      # Go modules are pull-based — no publish step needed.
      # Consumers add: go get github.com/totobusnello/memoria-nox/sdk/go@<tag>
