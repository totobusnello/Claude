name: SBOM Generation

# Generates a CycloneDX 1.4 SBOM for each sub-package on every push to main
# and on tagged releases. Artifacts are uploaded for 30 days; release assets
# will be attached starting from v1.0.0.
#
# Format: CycloneDX JSON (accepted by GitHub Dependency Review, CISA, NIST NVD)
# Tool:   @cyclonedx/cyclonedx-npm
#
# To generate locally:
#   npm install -g @cyclonedx/cyclonedx-npm
#   cd staged-A3 && cyclonedx-npm --output-format JSON --output-file ../sbom/sbom-staged-a3.cdx.json

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sbom:
    name: "Generate SBOM (CycloneDX)"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          # cache: 'npm' intentionally NOT set — repo has no root package-lock.json
          # (each staged-*/ has its own). Per-step `npm ci` below handles installs.

      - name: Install CycloneDX npm tool
        run: npm install -g @cyclonedx/cyclonedx-npm@1

      - name: Create sbom output directory
        run: mkdir -p sbom

      # ---------------------------------------------------------------------------
      # staged-A2 — archive / encryption
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-A2
        if: hashFiles('staged-A2/package.json') != ''
        run: |
          cd staged-A2
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-a2.cdx.json \
            --omit=dev \
            --package-lock-only 2>/dev/null || \
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-a2.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # staged-A3 — provider abstraction
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-A3
        if: hashFiles('staged-A3/package.json') != ''
        run: |
          cd staged-A3
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-a3.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # staged-P1 — answer primitive
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-P1
        if: hashFiles('staged-P1/package.json') != ''
        run: |
          cd staged-P1
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-p1.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # staged-P5a — event bus
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-P5a
        if: hashFiles('staged-P5a/package.json') != ''
        run: |
          cd staged-P5a
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-p5a.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # staged-L3 — confidence/provenance
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-L3
        if: hashFiles('staged-L3/package.json') != ''
        run: |
          cd staged-L3
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-l3.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # staged-L4 — typed-link extraction
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-L4
        if: hashFiles('staged-L4/package.json') != ''
        run: |
          cd staged-L4
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-l4.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # staged-privacy — PII filter
      # ---------------------------------------------------------------------------
      - name: SBOM — staged-privacy
        if: hashFiles('staged-privacy/package.json') != ''
        run: |
          cd staged-privacy
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../sbom/sbom-staged-privacy.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # eval/latency — benchmark harness
      # ---------------------------------------------------------------------------
      - name: SBOM — eval/latency
        if: hashFiles('eval/latency/package.json') != ''
        run: |
          cd eval/latency
          npm ci --ignore-scripts --omit=dev 2>/dev/null || npm install --ignore-scripts --omit=dev
          cyclonedx-npm \
            --output-format JSON \
            --output-file ../../sbom/sbom-eval-latency.cdx.json \
            --omit=dev
        continue-on-error: true

      # ---------------------------------------------------------------------------
      # Summary: list generated SBOMs
      # ---------------------------------------------------------------------------
      - name: List generated SBOMs
        run: |
          echo "Generated SBOM files:"
          ls -lh sbom/ 2>/dev/null || echo "(no sbom/ files — all sub-packages skipped)"
          echo ""
          echo "CycloneDX version check:"
          for f in sbom/*.cdx.json; do
            [ -f "$f" ] || continue
            spec=$(node -e "const d=JSON.parse(require('fs').readFileSync('$f','utf8')); console.log(d.specVersion || 'unknown')" 2>/dev/null)
            echo "  $f — specVersion: $spec"
          done

      # ---------------------------------------------------------------------------
      # Upload as workflow artifact (30-day retention)
      # ---------------------------------------------------------------------------
      - name: Upload SBOM artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sbom-artifacts
          path: sbom/
          retention-days: 30
          if-no-files-found: warn

      # ---------------------------------------------------------------------------
      # Attach to GitHub Release (when triggered by release event)
      # Future: add Sigstore Cosign signing here when v1.0.0 is tagged.
      # ---------------------------------------------------------------------------
      - name: Attach SBOMs to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in sbom/*.cdx.json; do
            [ -f "$f" ] || continue
            gh release upload "${{ github.ref_name }}" "$f" --clobber
            echo "Attached: $f"
          done
