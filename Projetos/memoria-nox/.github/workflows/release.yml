name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 1.0.0-rc1)"
        required: true
        type: string

jobs:
  preflight:
    name: Preflight (lint + syntax + security)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install yamllint + shellcheck
        run: pip install yamllint && sudo apt-get install -y shellcheck

      - name: YAML validate
        run: |
          find . -name "*.yml" -o -name "*.yaml" \
            | grep -v node_modules | grep -v .git \
            | xargs yamllint -d relaxed

      - name: JSON validate
        run: |
          find . -name "*.json" | grep -v node_modules | grep -v .git \
            | while read f; do python3 -m json.tool "$f" > /dev/null || { echo "FAIL: $f"; exit 1; }; done

      - name: Shell check
        run: |
          find . \( -path ./node_modules -o -path ./.git \) -prune -o -name "*.sh" -print \
            | xargs -r shellcheck --severity=error
        continue-on-error: true

  build-paper:
    name: Build Paper PDF
    runs-on: ubuntu-latest
    needs: preflight
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install LaTeX (texlive)
        run: sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Build paper PDF
        run: |
          if [ -f scripts/build-paper.sh ]; then
            bash scripts/build-paper.sh --pdf-only
          else
            echo "build-paper.sh not found — skipping PDF build"
          fi
        continue-on-error: true

      - name: Upload paper artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/*.pdf
          if-no-files-found: warn

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [preflight, build-paper]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Download paper artifact
        uses: actions/download-artifact@v4
        with:
          name: paper-pdf
          path: release-assets/
        continue-on-error: true

      - name: Read release notes
        id: notes
        run: |
          VERSION="${{ inputs.version }}"
          NOTES_FILE="docs/releases/v${VERSION}.md"
          if [ -f "$NOTES_FILE" ]; then
            echo "NOTES<<EOF" >> "$GITHUB_OUTPUT"
            cat "$NOTES_FILE" >> "$GITHUB_OUTPUT"
            echo "EOF" >> "$GITHUB_OUTPUT"
          else
            echo "NOTES=Release v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ inputs.version }}"
          name: "v${{ inputs.version }}"
          body: ${{ steps.notes.outputs.NOTES }}
          files: release-assets/**
          draft: false
          prerelease: ${{ contains(inputs.version, 'rc') || contains(inputs.version, 'beta') || contains(inputs.version, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
