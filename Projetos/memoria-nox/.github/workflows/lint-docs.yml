name: Lint Docs

on:
  push:
    branches: [main]
  pull_request:

jobs:
  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run markdownlint-cli2
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.yaml
          # Explicit canonical scope — bypass .markdownlintignore quirks
          globs: |
            docs/*.md
            docs/press-kit/**/*.md
            docs/research/*.md
            docs/discussions-seed/*.md
            docs/releases/*.md
            audits/*.md
            specs/*.md
            paper/abstract.md
            paper/refs-verification-log.md
            README.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
        continue-on-error: false

  link-check:
    name: Link Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Check internal links with lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --verbose
            --no-progress
            --offline
            --exclude-path
            .lycheeignore
            README.md
            CONTRIBUTING.md
            docs/QUICKSTART.md
            docs/TUTORIAL.md
            docs/FAQ.md
            docs/ARCHITECTURE.md
          fail: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
