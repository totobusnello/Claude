name: SDK — Java

on:
  push:
    paths:
      - "sdk/java/**"
      - ".github/workflows/sdk-java.yml"
  pull_request:
    paths:
      - "sdk/java/**"
      - ".github/workflows/sdk-java.yml"

jobs:
  build-and-test:
    name: Java ${{ matrix.java }} build + test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: ["17", "21"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: maven

      - name: Compile
        working-directory: sdk/java
        run: mvn --no-transfer-progress compile

      - name: Test
        working-directory: sdk/java
        run: mvn --no-transfer-progress test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: java-test-results-jdk${{ matrix.java }}
          path: sdk/java/target/surefire-reports/

