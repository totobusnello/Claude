name: Eval Harnesses (Dry-Run)

on:
  pull_request:
    paths:
      - 'eval/**'
      - '.github/workflows/eval-harnesses.yml'
  push:
    branches: [main]
    paths:
      - 'eval/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Q1 — LoCoMo retrieval harness (dry-run: no real dataset, no API calls)
  # Default mode omits --full, making dryRun=true inside run.ts
  # ---------------------------------------------------------------------------
  locomo-dry-run:
    name: "Q1 LoCoMo — dry-run (n=10)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tsx
        run: npm install -g tsx@4

      - name: Check eval/locomo exists
        id: locomo_check
        run: |
          if [ -d "eval/locomo" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::eval/locomo not merged yet — skipping Q1 dry-run"
          fi

      - name: Install locomo dependencies
        if: steps.locomo_check.outputs.present == 'true'
        run: |
          if [ -f eval/locomo/package.json ]; then
            cd eval/locomo && npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          fi

      - name: Build locomo TypeScript
        if: steps.locomo_check.outputs.present == 'true'
        working-directory: eval/locomo
        run: |
          # `npx tsc` without local typescript pulls the unrelated `tsc@2.0.4`
          # package — use `-p typescript` to force the actual compiler.
          npx -y -p typescript@5 tsc --noEmit 2>&1 | head -30 || true
          npx -y -p typescript@5 tsc 2>&1 | head -30

      - name: Run LoCoMo dry-run (n=10, no --full = dry-run mode)
        if: steps.locomo_check.outputs.present == 'true'
        run: |
          # dry-run is the DEFAULT — absence of --full flag activates it.
          # Requires eval/locomo/eval.db (seeded by download.ts on VPS).
          # In CI without eval.db: run.ts emits early-exit with structured JSON stub.
          cd eval/locomo
          npx tsx run.ts --n 10 2>&1 | tee /tmp/locomo-dry-run.json || {
            EXIT=$?
            # Exit 1 is acceptable in CI if the corpus DB is absent (no download.ts ran)
            if grep -q '"dryRun":true' /tmp/locomo-dry-run.json 2>/dev/null; then
              echo "::notice::LoCoMo dry-run completed (corpus absent, structure validated)"
            else
              echo "::warning::LoCoMo dry-run exited $EXIT — see output above"
            fi
          }
        env:
          NOX_MEM_BIN: /dev/null
          CI: 'true'

      - name: Validate output JSON shape (dry-run-sample.json)
        if: steps.locomo_check.outputs.present == 'true'
        run: |
          # dry-run-sample.json is the reference fixture committed in the PR
          if [ -f eval/locomo/dry-run-sample.json ]; then
            node -e "
              const s = JSON.parse(require('fs').readFileSync('eval/locomo/dry-run-sample.json','utf8'));
              if (!s.meta || !Array.isArray(s.records)) {
                console.error('Shape check FAILED: missing meta or records array');
                process.exit(1);
              }
              const rec = s.records[0];
              const required = ['question_id','question','retrieved_chunk_ids','retrieval_ms'];
              const missing = required.filter(k => !(k in rec));
              if (missing.length) {
                console.error('Shape check FAILED: missing fields', missing);
                process.exit(1);
              }
              console.log('Shape OK — meta:', JSON.stringify(s.meta), 'records:', s.records.length);
            "
          else
            echo "::warning::dry-run-sample.json not present — shape check skipped"
          fi

  # ---------------------------------------------------------------------------
  # Q2 — LongMemEval harness (dry-run: no ingest, no LLM calls)
  # Same pattern as Q1: absence of --full = dryRun=true in run.ts
  # ---------------------------------------------------------------------------
  longmemeval-dry-run:
    name: "Q2 LongMemEval — dry-run (n=10)"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tsx
        run: npm install -g tsx@4

      - name: Check eval/longmemeval exists
        id: lme_check
        run: |
          if [ -d "eval/longmemeval" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::eval/longmemeval not merged yet — skipping Q2 dry-run"
          fi

      - name: Install longmemeval dependencies
        if: steps.lme_check.outputs.present == 'true'
        run: |
          if [ -f eval/longmemeval/package.json ]; then
            cd eval/longmemeval && npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          fi

      - name: Build longmemeval TypeScript
        if: steps.lme_check.outputs.present == 'true'
        working-directory: eval/longmemeval
        run: |
          # Same bug as locomo — pin the real typescript package.
          npx -y -p typescript@5 tsc --noEmit 2>&1 | head -30 || true
          npx -y -p typescript@5 tsc 2>&1 | head -30

      - name: Run LongMemEval dry-run (n=10, --no-llm skips generator)
        if: steps.lme_check.outputs.present == 'true'
        run: |
          cd eval/longmemeval
          npx tsx run.ts --n 10 --no-llm 2>&1 | tee /tmp/longmemeval-dry-run.json || {
            EXIT=$?
            if grep -q '"dryRun":true' /tmp/longmemeval-dry-run.json 2>/dev/null; then
              echo "::notice::LongMemEval dry-run completed (corpus absent, structure validated)"
            else
              echo "::warning::LongMemEval dry-run exited $EXIT — see output above"
            fi
          }
        env:
          NOX_MEM_BIN: /dev/null
          CI: 'true'

      - name: Validate output shape (dry-run-sample.json)
        if: steps.lme_check.outputs.present == 'true'
        run: |
          if [ -f eval/longmemeval/dry-run-sample.json ]; then
            node -e "
              const s = JSON.parse(require('fs').readFileSync('eval/longmemeval/dry-run-sample.json','utf8'));
              if (!s.meta || !Array.isArray(s.records)) {
                console.error('Shape FAILED: missing meta or records');
                process.exit(1);
              }
              console.log('Shape OK — meta:', JSON.stringify(s.meta), 'records:', s.records.length);
            "
          else
            echo "::warning::dry-run-sample.json not present — shape check skipped"
          fi

  # ---------------------------------------------------------------------------
  # Q3 — Latency benchmark (synthetic dry-run via dry-run.ts, no nox-mem binary)
  # Uses eval/latency/src/dry-run.ts which generates synthetic p50/p95/p99
  # ---------------------------------------------------------------------------
  latency-dry-run:
    name: "Q3 Latency — synthetic dry-run"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install tsx
        run: npm install -g tsx@4

      - name: Check eval/latency exists
        id: lat_check
        run: |
          if [ -d "eval/latency" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "::warning::eval/latency not merged yet — skipping Q3 dry-run"
          fi

      - name: Install latency dependencies
        if: steps.lat_check.outputs.present == 'true'
        run: |
          if [ -f eval/latency/package.json ]; then
            cd eval/latency && npm ci --ignore-scripts 2>/dev/null || npm install --ignore-scripts
          fi

      - name: Build latency TypeScript
        if: steps.lat_check.outputs.present == 'true'
        working-directory: eval/latency
        run: |
          # Pin typescript package — bare `npx tsc` pulls unrelated tsc@2.0.4.
          npx -y -p typescript@5 tsc 2>&1 | head -30

      - name: Run synthetic dry-run (no binary, no DB)
        if: steps.lat_check.outputs.present == 'true'
        run: |
          # dry-run.ts emits synthetic WorkloadRun, pipes through aggregator
          cd eval/latency
          node dist/dry-run.js 2>&1 | tee /tmp/latency-dry-run.json

      - name: Validate dry-run output shape
        if: steps.lat_check.outputs.present == 'true'
        run: |
          node -e "
            const s = JSON.parse(require('fs').readFileSync('/tmp/latency-dry-run.json','utf8'));
            const wl = s.workloads?.['search.short'];
            if (!wl) { console.error('Missing workloads.search.short'); process.exit(1); }
            if (!wl.p50_ms || !wl.p95_ms || !wl.p99_ms) {
              console.error('Missing p50/p95/p99 in workload summary'); process.exit(1);
            }
            console.log('Shape OK — p50:', wl.p50_ms, 'p95:', wl.p95_ms, 'p99:', wl.p99_ms);
          " 2>/dev/null || echo "::warning::Latency output shape check skipped (format may differ)"

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v4
        if: always() && steps.lat_check.outputs.present == 'true'
        with:
          name: latency-dry-run-${{ github.sha }}
          path: /tmp/latency-dry-run.json
          retention-days: 7
