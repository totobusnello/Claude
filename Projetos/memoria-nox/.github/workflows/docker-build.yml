name: Docker — Build + Push + Smoke Test

on:
  # Disabled on push to main — Dockerfile expects root package.json which
  # doesn't exist yet (each staged-*/ has its own). Re-enable when repo has
  # a root package.json wrapping the staged dirs, OR when Dockerfile is
  # refactored to multi-stage from a specific staged-* directory.
  # Re-enable: change condition below + remove this comment.
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]*'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile'
      - 'docker-compose.yml'
      - '.dockerignore'
      - 'scripts/docker-entrypoint.sh'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:

permissions:
  contents: read
  packages: write   # push to ghcr.io
  id-token: write   # needed for attestation (future)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: totobusnello/memoria-nox

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  # Build, push, and smoke-test the Docker image
  # ─────────────────────────────────────────────────────────────────────────
  docker:
    name: "Build + smoke test (${{ matrix.platform }})"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux/amd64
          - linux/arm64

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      # ── Set up QEMU for cross-platform builds ─────────────────────────────
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: ${{ matrix.platform }}

      # ── Set up Docker Buildx ──────────────────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-flags: --debug

      # ── Log in to GHCR (only on push to main or tag) ─────────────────────
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Derive image tags ─────────────────────────────────────────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            # 'latest' only on main branch pushes
            type=raw,value=latest,enable={{is_default_branch}}

      # ── Layer cache (GitHub Actions cache backend) ────────────────────────
      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: ${{ runner.os }}-buildx-${{ matrix.platform }}-${{ hashFiles('Dockerfile', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-buildx-${{ matrix.platform }}-

      # ── Build image ───────────────────────────────────────────────────────
      - name: Build image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: false   # load to local daemon for smoke test first
          load: true    # only works for single-platform build
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          cache-to: type=local,dest=/tmp/.buildx-cache-new,mode=max
          build-args: |
            BUILDKIT_INLINE_CACHE=1

      # Rotate cache (prevents unbounded growth)
      - name: Move cache
        run: |
          rm -rf /tmp/.buildx-cache
          mv /tmp/.buildx-cache-new /tmp/.buildx-cache

      # ── Smoke test: start container, hit /api/health ──────────────────────
      - name: Smoke test — start container
        run: |
          # Use the first tag produced by meta for local run
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

          # Start container with a fake Gemini key — NOX_PROVIDER_HEALTH_FAIL_FAST=0
          # so the process comes up even without a real key for smoke test purposes
          mkdir -p /tmp/nox-smoke-data
          docker run -d \
            --name nox-smoke \
            -p 18802:18802 \
            -v /tmp/nox-smoke-data:/data \
            -e GEMINI_API_KEY=smoke-test-fake-key-ci \
            -e NOX_DB_PATH=/data/nox-mem.db \
            -e NOX_MEM_DIR=/data \
            -e NOX_PROVIDER_HEALTH_FAIL_FAST=0 \
            -e NOX_API_PORT=18802 \
            "$IMAGE_TAG"

      - name: Smoke test — wait for API to be ready
        run: |
          MAX_WAIT=30
          ELAPSED=0
          until curl -sf http://localhost:18802/api/health > /dev/null 2>&1; do
            if [ "$ELAPSED" -ge "$MAX_WAIT" ]; then
              echo "Timed out waiting for /api/health after ${MAX_WAIT}s"
              docker logs nox-smoke
              exit 1
            fi
            sleep 2
            ELAPSED=$((ELAPSED + 2))
            echo "Waiting... ${ELAPSED}s"
          done
          echo "API ready after ${ELAPSED}s"

      - name: Smoke test — assert /api/health returns 200
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:18802/api/health)
          echo "HTTP status: $HTTP_STATUS"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "FAIL: expected 200, got $HTTP_STATUS"
            docker logs nox-smoke
            exit 1
          fi
          echo "PASS: /api/health returned 200"

      - name: Smoke test — verify health response shape
        run: |
          HEALTH=$(curl -sf http://localhost:18802/api/health)
          echo "Health response: $HEALTH"
          # Must have chunkCount and schemaVersion fields
          echo "$HEALTH" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert 'chunkCount' in d, 'Missing chunkCount'
          assert 'schemaVersion' in d, 'Missing schemaVersion'
          print(f'PASS: chunkCount={d[\"chunkCount\"]}, schemaVersion={d[\"schemaVersion\"]}')
          "

      - name: Smoke test — cleanup
        if: always()
        run: docker rm -f nox-smoke || true

      # ── Report image size ─────────────────────────────────────────────────
      - name: Report image size
        run: |
          IMAGE_TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          SIZE=$(docker image inspect "$IMAGE_TAG" --format '{{.Size}}' | \
            awk '{printf "%.1f MB", $1/1024/1024}')
          echo "Image size (${{ matrix.platform }}): $SIZE"
          echo "SIZE_REPORT=Image size (${{ matrix.platform }}): $SIZE" >> "$GITHUB_ENV"

      # ── Push to GHCR (only on push to main or version tag) ───────────────
      - name: Push image to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=local,src=/tmp/.buildx-cache
          build-args: |
            BUILDKIT_INLINE_CACHE=1

  # ─────────────────────────────────────────────────────────────────────────
  # Create a combined multi-arch manifest after both platform jobs succeed
  # Runs only on push to main or tags (not PRs)
  # ─────────────────────────────────────────────────────────────────────────
  manifest:
    name: "Create multi-arch manifest"
    needs: docker
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    timeout-minutes: 10

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout (for metadata action)
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create and push multi-arch manifest
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
