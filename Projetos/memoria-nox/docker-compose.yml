services:
  nox-mem-api:
    build:
      context: .
      dockerfile: Dockerfile
      # Multi-arch: run `docker buildx bake` or pass --platform to `docker buildx build`
    image: ghcr.io/totobusnello/memoria-nox:latest
    container_name: nox-mem-api
    restart: unless-stopped

    # Load all env vars from .env (copy from .env.example to create it)
    env_file:
      - .env
    environment:
      # Container-side overrides — point DB at the persistent volume
      NOX_DB_PATH: /data/nox-mem.db
      NOX_MEM_DIR: /data
      # Health check must not fail hard on first boot if provider is not yet configured
      NOX_PROVIDER_HEALTH_FAIL_FAST: "0"

    ports:
      # Bind only to localhost so you can control ingress via reverse proxy or SSH tunnel
      - "127.0.0.1:18802:18802"

    volumes:
      # SQLite database + all persistent data (KG snapshots, op-audit backups, etc.)
      - ./data:/data

    networks:
      - nox_net

    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:18802/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    # Security hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Read-only root FS; /data is the only writable surface (via volume)
    read_only: true
    # tmpfs for transient writes the process might need (Node IPC socket, npm tmp)
    tmpfs:
      - /tmp:size=64m,noexec,nosuid

networks:
  nox_net:
    driver: bridge
    name: nox_net
