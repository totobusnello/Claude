# Zep 0.27.2 OSS — Q4 comparison stack config.
#
# CROSS-SYSTEM BENCHMARK MODE (2026-05-24):
# OpenAI embeddings ENABLED so Zep can do semantic search on ingested messages.
# Without embeddings, Zep's message search would fall back to no-vectors, defeating
# the comparison. We deliberately pay for OpenAI embed (text-embedding-3-small,
# 1536d, ~$0.02/1M tokens) so Zep gets a fair shot at retrieval quality.
#
# Cost cap: ~$0.05 expected for 6830 chunks × ~200 tokens/chunk avg. Hard ceiling
# documented in PR (task budget $0.50). Entities + Summarizer + Intent stay
# DISABLED (those require LLM completions, separate quota, and we measure
# retrieval not enrichment).

LLM:
  Service: openai
  Model: gpt-4o-mini
  OpenAIAPIKey: ""  # picked up from ZEP_OPENAI_API_KEY env var

Extractors:
  Messages:
    Summarizer:
      Enabled: false
      Embeddings:
        Enabled: true
        Dimensions: 1536
        Service: "openai"
        ChunkSize: 1000
      Entities:
        Enabled: false
    Embeddings:
      Enabled: true
      Dimensions: 1536
      Service: "openai"
      ChunkSize: 1000
    Entities:
      Enabled: false
    Intent:
      Enabled: false
  Documents:
    Embeddings:
      Enabled: false
      Dimensions: 1536
      Service: ""
      ChunkSize: 0

Store:
  Type: postgres
  Postgres:
    DSN: "postgres://zep:zep@postgres:5432/zep?sslmode=disable"

Server:
  Host: "0.0.0.0"
  Port: 8000
  WebEnabled: false
  MaxRequestSize: 5242880

Memory:
  MessageWindow: 12

Auth:
  Required: false
  Secret: "not-required"

Log:
  Level: info

DataConfig:
  PurgeEvery: 60

Development: false

CustomPrompts:
  SummarizerPrompts:
    OpenAI: ""
    Anthropic: ""
