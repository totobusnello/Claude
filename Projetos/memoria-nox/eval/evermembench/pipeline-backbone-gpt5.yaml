# Backbone Matrix — gpt-5 answer backbone (2026-05-29).
#
# Swap answer model from gpt-4.1-mini (Phase H v2) to gpt-5 frontier.
# Routes via OpenAI direct (same key as Phase H v2). Reasoning-family model
# (max_completion_tokens + reasoning_effort=minimal applied by patched answerer).
# Judge stays on gemini-2.5-flash (isolates backbone change to answer stage).

answer:
  model: "gpt-5"
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai.com/v1"
  temperature: 1
  max_tokens: 1000
  timeout: 600
  concurrency: 4

evaluate:
  model: "gemini-2.5-flash"
  api_key: "${GEMINI_API_KEY}"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  temperature: 0
  max_tokens: 1000
  timeout: 300
  concurrency: 8

search:
  concurrency: 3
  timeout: 120

retry:
  max_retries: 20
  retry_delay: 1.0
  max_delay: 300

debug:
  show_usage: false

warmup:
  enabled: true
  delay_seconds: 15
