# Backbone Matrix — gemini-3.1-flash-lite-preview answer backbone (2026-05-29).
#
# Swap answer model to gemini-3.1-flash-lite-preview (frontier-lite Gemini).
# Routes via Gemini OpenAI-compat endpoint. Fast (~1s latency on 3.3k tokens).
# Judge stays on gemini-2.5-flash (homogeneous Gemini family acknowledged).

answer:
  model: "gemini-3.1-flash-lite-preview"
  api_key: "${GEMINI_API_KEY}"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  temperature: 0
  max_tokens: 1000
  timeout: 300
  concurrency: 4

evaluate:
  model: "gemini-2.5-flash"
  api_key: "${GEMINI_API_KEY}"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  temperature: 0
  max_tokens: 1000
  timeout: 300
  concurrency: 8

search:
  concurrency: 3
  timeout: 120

retry:
  max_retries: 20
  retry_delay: 1.0
  max_delay: 300

debug:
  show_usage: false

warmup:
  enabled: true
  delay_seconds: 15
