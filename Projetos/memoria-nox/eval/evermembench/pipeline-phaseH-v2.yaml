# Phase H v2 — GPT-4.1-mini parity (2026-05-28).
# Swap answer model from gemini-2.5-flash to gpt-4.1-mini.
# Routes via OpenAI direct (NOT OpenRouter — credit zero em v1; key rotacionado por Toto).
# Matches MemOS paper Table 4 methodology exactly.
#
# Keep evaluate stage on gemini-2.5-flash (same judge as Phase D, isolates backbone change to answer).
# Both stages carry per-block api_key + base_url so they route to different providers.

answer:
  model: "gpt-4.1-mini"
  api_key: "${OPENAI_API_KEY}"
  base_url: "https://api.openai.com/v1"
  temperature: 0
  max_tokens: 1000
  timeout: 300
  concurrency: 4

evaluate:
  model: "gemini-2.5-flash"
  api_key: "${GEMINI_API_KEY}"
  base_url: "https://generativelanguage.googleapis.com/v1beta/openai/"
  temperature: 0
  max_tokens: 1000
  timeout: 300
  concurrency: 8

search:
  concurrency: 3
  timeout: 120

retry:
  max_retries: 20
  retry_delay: 1.0
  max_delay: 300

debug:
  show_usage: false

warmup:
  enabled: true
  delay_seconds: 15
