<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" width="1200" height="675" font-family="'SF Mono','JetBrains Mono','Cascadia Code','Courier New',monospace">
  <!-- Full bleed background -->
  <rect width="1200" height="675" fill="#0F172A"/>

  <!-- Window chrome with radius -->
  <rect x="60" y="50" width="1080" height="545" rx="10" ry="10" fill="#1E293B"/>

  <!-- Title bar -->
  <rect x="60" y="50" width="1080" height="42" rx="10" ry="10" fill="#1E293B"/>
  <rect x="60" y="72" width="1080" height="20" fill="#1E293B"/>

  <!-- Traffic lights -->
  <circle cx="96" cy="71" r="7" fill="#E11D48"/>
  <circle cx="120" cy="71" r="7" fill="#D97706"/>
  <circle cx="144" cy="71" r="7" fill="#059669"/>

  <!-- Window title -->
  <text x="600" y="76" text-anchor="middle" font-size="12" fill="#475569" font-family="'SF Mono','Courier New',monospace">nox-mem — zsh — 80×24</text>

  <!-- Terminal content area -->
  <rect x="60" y="92" width="1080" height="503" rx="0" ry="0" fill="#0F172A"/>
  <rect x="60" y="565" width="1080" height="30" rx="0" ry="0" fill="#0F172A"/>
  <rect x="60" y="82" width="1080" height="503" fill="#0F172A"/>

  <!-- Line 1: timestamp + cron task -->
  <text x="90" y="148" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">[22:03:14]</text>
  <text x="196" y="148" font-size="13.5" fill="#94A3B8" font-family="'SF Mono','Courier New',monospace">cron: running scheduled task</text>
  <text x="562" y="148" font-size="13.5" fill="#F8FAFC" font-family="'SF Mono','Courier New',monospace">nox-mem-eod</text>

  <!-- Line 2: command -->
  <text x="90" y="176" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">[22:03:15]</text>
  <text x="196" y="176" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">$</text>
  <text x="215" y="176" font-size="13.5" fill="#F8FAFC" font-weight="bold" font-family="'SF Mono','Courier New',monospace">nox-mem reindex --all</text>

  <!-- Line 3: scanning -->
  <text x="90" y="204" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">[22:03:15]</text>
  <text x="196" y="204" font-size="13.5" fill="#94A3B8" font-family="'SF Mono','Courier New',monospace">  → scanning 62,836 chunks...</text>

  <!-- Line 4: reindexing -->
  <text x="90" y="232" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">[22:03:16]</text>
  <text x="196" y="232" font-size="13.5" fill="#94A3B8" font-family="'SF Mono','Courier New',monospace">  → reindexing FTS5...</text>

  <!-- Line 5: done -->
  <text x="90" y="260" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">[22:03:17]</text>
  <text x="196" y="260" font-size="13.5" fill="#94A3B8" font-family="'SF Mono','Courier New',monospace">  → done. 62,836 processed.</text>

  <!-- Line 6: success (false positive in emerald — the horror) -->
  <text x="90" y="304" font-size="13.5" fill="#475569" font-family="'SF Mono','Courier New',monospace">[22:03:17]</text>
  <text x="196" y="304" font-size="13.5" fill="#059669" font-family="'SF Mono','Courier New',monospace">✓  reindex complete.</text>

  <!-- Cursor (amber block, creates tension) -->
  <rect x="196" y="326" width="9" height="16" fill="#D97706"/>

  <!-- Divider line (dashed visual) -->
  <line x1="90" y1="362" x2="1110" y2="362" stroke="#1E293B" stroke-width="1.5" stroke-dasharray="6,4"/>

  <!-- Editorial footer: 183 entities line -->
  <text x="90" y="400" font-size="15.5" fill="#CBD5E1" font-style="italic" font-family="'Helvetica Neue','Arial',sans-serif">183 entities</text>
  <text x="222" y="400" font-size="15.5" fill="#D97706" font-style="italic" font-weight="bold" font-family="'Helvetica Neue','Arial',sans-serif">silently</text>
  <text x="303" y="400" font-size="15.5" fill="#CBD5E1" font-style="italic" font-family="'Helvetica Neue','Arial',sans-serif">lost section, retention, and boost.</text>

  <!-- Editorial footer: second line -->
  <text x="90" y="432" font-size="15.5" fill="#CBD5E1" font-style="italic" font-family="'Helvetica Neue','Arial',sans-serif">No error. No alert. The database just... obeyed.</text>

  <!-- Subtle corner label: 2026-04-25 BRT -->
  <text x="1100" y="596" text-anchor="end" font-size="11" fill="#334155" font-family="'SF Mono','Courier New',monospace">2026-04-25 22:03 BRT</text>
</svg>
